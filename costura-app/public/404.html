<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>404 — CosturaOnline</title>
  </head>
  <body>
    <script>
      // SPA fallback: si el host sirve una 404 para rutas deep-link,
      // cargamos index.html para que React Router pueda manejar la ruta.
      fetch('/index.html')
        .then(function(resp){ return resp.text(); })
        .then(function(html){
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function(){ window.location.replace('/'); });
    </script>
  </body>
</html>
